# NEXORA — деплой на Render (https://render.com)
# New → Blueprint → подключите GitHub-репозиторий
#
# ВАЖНО: на plan: free нельзя использовать disk: — будет ошибка Blueprint.
# SQLite (prod.db) живёт во временной файловой системе; при редеплое данные могут сброситься.

services:
  - type: web
    name: nexora-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build --workspace=@nexora/shared && cd apps/api && npx prisma generate && npm run build
    startCommand: cd apps/api && npx prisma db push && node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./prod.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # После первого деплоя замените на реальные URL с https:// (см. DEPLOY.md)
      - key: WEB_URL
        value: https://nexora-web.onrender.com
      - key: CORS_ORIGINS
        value: https://nexora-web.onrender.com

  - type: web
    name: nexora-web
    runtime: node
    plan: free
    buildCommand: npm install && npm run build --workspace=@nexora/shared && cd apps/web && npm run build
    startCommand: cd apps/web && npm run start -- -p $PORT
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://nexora-api.onrender.com
      - key: NEXT_PUBLIC_WS_URL
        value: https://nexora-api.onrender.com
